server:
  port: 8888 # The required port for the Config Server

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          # Points to a local folder named 'config-repo' in your user directory.
          # You can also use a remote HTTP URI here (e.g., https://github.com/your-username/config-repo.git)
          uri: file://${user.home}/config-repo 
          # default-label: main # Uncomment if your default git branch is 'main' instead of 'master'

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/